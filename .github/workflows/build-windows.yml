name: Build Windows Executable

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic Pillow imagehash requests python-dotenv pyinstaller

      - name: Inject API key
        shell: python
        run: |
          content = open('snapsift_gui.py', encoding='utf-8').read()
          content = content.replace('YOUR_API_KEY_HERE', '${{ secrets.ANTHROPIC_API_KEY }}')
          open('snapsift_gui.py', 'w', encoding='utf-8').write(content)
          print('API key injected!')

      - name: Build executable
        run: pyinstaller --windowed --noconsole --name "SnapSift-AI" snapsift_gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapSift-AI-Windows
          path: dist/SnapSift-AI/
